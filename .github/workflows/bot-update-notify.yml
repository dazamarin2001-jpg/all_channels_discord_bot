name: Post MADBOT update

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  post-update:
    runs-on: ubuntu-latest
    steps:
      - name: Post update to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.BOT_UPDATE_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_URL: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "BOT_UPDATE_WEBHOOK_URL secret is missing."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ["DISCORD_WEBHOOK"]
          commit_message = os.environ.get("COMMIT_MESSAGE") or "Manual update triggered"
          commit_author = os.environ.get("COMMIT_AUTHOR") or "GitHub"
          commit_sha = (os.environ.get("COMMIT_SHA") or "")[:7]
          commit_url = os.environ.get("COMMIT_URL") or ""

          first_line = commit_message.splitlines()[0][:180]
          lower = commit_message.lower()
          notes = []

          if "rank" in lower and "sale" in lower:
              notes.extend([
                  "`/rank-sale` logs sales and shows seller totals in the Discord log.",
                  "`/rank-sales-summary` shows top rank sellers.",
                  "The `Rank Seller Totals` Google Sheet tab updates automatically.",
              ])
          elif "update" in lower:
              notes.append("Bot update log system improved.")
          else:
              notes.append("New bot code update was pushed.")

          payload = {
              "username": "MADBOT Updates",
              "embeds": [{
                  "title": f"MADBOT Update — {first_line}",
                  "description": "Quick instructions:\n" + "\n".join(f"• {note}" for note in notes),
                  "color": 5793266,
                  "fields": [
                      {"name": "Commit", "value": f"[`{commit_sha}`]({commit_url})", "inline": True},
                      {"name": "Updated by", "value": commit_author, "inline": True},
                  ],
              }],
          }

          request = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=15) as response:
              print(response.status)
          PY
