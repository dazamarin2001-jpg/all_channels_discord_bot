name: Rename Discord Commands

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename-commands:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch bot.py sale group
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64

          path = Path('bot.py')
          text = path.read_text(encoding='utf-8')

          sync_old = 'bot.tree.copy_global_to(guild=guild_object)\n            await bot.tree.sync(guild=guild_object)'
          sync_new = 'bot.tree.clear_commands(guild=guild_object)\n            bot.tree.copy_global_to(guild=guild_object)\n            await bot.tree.sync(guild=guild_object)'
          text = text.replace(sync_old, sync_new)

          start_marker = '@bot.tree.command(name="sale", description="Open a form to log a rank sale into Google Sheets.")'
          end_marker = '@bot.tree.command(name="setup-rank-sales-sheet", description="Clean and style the rank sales Google Sheet.")'
          encoded = ''
          sale_group_code = base64.b64decode(encoded).decode('utf-8')

          if 'sale_group = app_commands.Group(name="sale"' not in text:
              start = text.find(start_marker)
              end = text.find(end_marker)
              if start == -1:
                  raise SystemExit('Could not find /sale command start marker.')
              if end == -1:
                  raise SystemExit('Could not find setup-rank-sales-sheet marker.')
              if end <= start:
                  raise SystemExit('Command markers are out of order.')
              text = text[:start] + sale_group_code + text[end:]

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit sale group patch
        run: |
          if git diff --quiet; then
            echo "No sale command group changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot.py
          git commit -m "Add sale log and summary commands"
          git push
