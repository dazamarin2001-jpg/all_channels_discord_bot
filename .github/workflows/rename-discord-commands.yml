name: Rename Discord Commands

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename-commands:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch credit parser
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('bot.py')
          text = path.read_text(encoding='utf-8')

          old = '''                      amount_text = padded[5].strip().lower().replace(",", "")

                      amount_digits = ""
                      for char in amount_text:
                          if char.isdigit():
                              amount_digits += char
                          elif amount_digits:
                              break
                      amount = int(amount_digits) if amount_digits else 0
'''
          new = '''                      amount_text = padded[5].strip().lower().replace(",", "")

                      amount = 0
                      number = ""
                      for char in amount_text + " ":
                          if char.isdigit():
                              number += char
                              continue
                          if number:
                              value = int(number)
                              nearby = amount_text[max(0, amount_text.find(number) - 2):amount_text.find(number) + len(number) + 4]
                              if "gb" in nearby or "gold" in nearby:
                                  amount += value * 50
                              else:
                                  amount += value
                              number = ""
'''

          if old not in text:
              raise SystemExit('Could not find old amount parser block.')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit credit parser patch
        run: |
          if git diff --quiet; then
            echo "No credit parser changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot.py
          git commit -m "Fix sale summary credit totals"
          git push
