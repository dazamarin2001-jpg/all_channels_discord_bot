name: Rename Discord Commands

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename-commands:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch credit parser
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('bot.py')
          lines = path.read_text(encoding='utf-8').splitlines()

          target = [
              '            amount_digits = ""',
              '            for char in amount_text:',
              '                if char.isdigit():',
              '                    amount_digits += char',
              '                elif amount_digits:',
              '                    break',
              '            amount = int(amount_digits) if amount_digits else 0',
          ]

          replacement = [
              '            amount = 0',
              '            number = ""',
              '            for char in amount_text + " ":',
              '                if char.isdigit():',
              '                    number += char',
              '                    continue',
              '                if number:',
              '                    value = int(number)',
              '                    idx = amount_text.find(number)',
              '                    nearby = amount_text[max(0, idx - 2):idx + len(number) + 4]',
              '                    if "gb" in nearby or "gold" in nearby:',
              '                        amount += value * 50',
              '                    else:',
              '                        amount += value',
              '                    number = ""',
          ]

          for index in range(len(lines) - len(target) + 1):
              if lines[index:index + len(target)] == target:
                  lines[index:index + len(target)] = replacement
                  path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
                  break
          else:
              raise SystemExit('Could not find old amount parser block.')
          PY

      - name: Commit credit parser patch
        run: |
          if git diff --quiet; then
            echo "No credit parser changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot.py
          git commit -m "Fix sale summary credit totals"
          git push
