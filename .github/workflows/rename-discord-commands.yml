name: Rename Discord Commands

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename-commands:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch rank seller totals sync
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('bot.py')
          text = path.read_text(encoding='utf-8')

          helper_marker = 'def append_rank_sale_to_sheet(row: list[str]) -> None:'
          if 'def parse_credit_amount(amount_text: str) -> int:' not in text:
              helper = '''def parse_credit_amount(amount_text: str) -> int:
    amount_text = str(amount_text).strip().lower().replace(",", "")
    total = 0
    number = ""
    for char in amount_text + " ":
        if char.isdigit():
            number += char
            continue
        if number:
            value = int(number)
            idx = amount_text.find(number)
            nearby = amount_text[max(0, idx - 2):idx + len(number) + 6]
            if "gb" in nearby or "gold" in nearby:
                total += value * 50
            else:
                total += value
            number = ""
    return total


def get_or_create_worksheet(spreadsheet, title: str, rows: int, cols: int):
    try:
        return spreadsheet.worksheet(title)
    except gspread.WorksheetNotFound:
        return spreadsheet.add_worksheet(title=title, rows=rows, cols=cols)


def sync_rank_seller_totals() -> None:
    worksheet = get_rank_sales_worksheet()
    spreadsheet = worksheet.spreadsheet
    values = worksheet.get_all_values()
    rows = values[1:] if len(values) > 1 else []

    totals = {}
    for row in rows:
        padded = list(row) + [""] * 7
        discord_username = padded[1].strip()
        seller_habbo = padded[2].strip()
        rank_sold = padded[4].strip()
        amount_text = padded[5].strip()
        timestamp = padded[0].strip()

        if not discord_username or discord_username.lower().startswith("20"):
            continue

        credits = parse_credit_amount(amount_text)
        key = discord_username.casefold()
        if key not in totals:
            totals[key] = {
                "discord": discord_username,
                "habbo": seller_habbo,
                "sales": 0,
                "amount": 0,
                "last_sale": timestamp,
                "last_rank": rank_sold,
            }
        totals[key]["sales"] += 1
        totals[key]["amount"] += credits
        if timestamp:
            totals[key]["last_sale"] = timestamp
        if rank_sold:
            totals[key]["last_rank"] = rank_sold
        if seller_habbo:
            totals[key]["habbo"] = seller_habbo

    output = [["Discord Username", "Habbo Username", "Total Sales", "Total Amount Sold", "Last Sale", "Last Rank Sold"]]
    sorted_totals = sorted(totals.values(), key=lambda item: (item["amount"], item["sales"]), reverse=True)
    for item in sorted_totals:
        output.append([
            item["discord"],
            item["habbo"],
            item["sales"],
            f'{item["amount"]}c',
            item["last_sale"],
            item["last_rank"],
        ])

    totals_sheet = get_or_create_worksheet(spreadsheet, "Rank Seller Totals", rows=max(1000, len(output) + 20), cols=6)
    totals_sheet.clear()
    totals_sheet.update(range_name="A1", values=output, value_input_option="USER_ENTERED")
    try:
        totals_sheet.format("A1:F1", {
            "backgroundColor": {"red": 0.18, "green": 0.08, "blue": 0.36},
            "textFormat": {"foregroundColor": {"red": 1, "green": 1, "blue": 1}, "bold": True, "fontSize": 11},
            "horizontalAlignment": "CENTER",
        })
        totals_sheet.format("A2:F1000", {"backgroundColor": {"red": 0.97, "green": 0.95, "blue": 1.0}, "horizontalAlignment": "CENTER"})
        totals_sheet.freeze(rows=1)
    except Exception as exc:
        print(f"Rank seller totals style warning: {type(exc).__name__}: {exc}")


'''
              text = text.replace(helper_marker, helper + helper_marker, 1)

          old = '''    worksheet.append_row(row, value_input_option="USER_ENTERED")
    apply_rank_sales_sheet_style(worksheet)
'''
          new = '''    worksheet.append_row(row, value_input_option="USER_ENTERED")
    apply_rank_sales_sheet_style(worksheet)
    sync_rank_seller_totals()
'''
          if 'sync_rank_seller_totals()' not in text.split('def append_rank_sale_to_sheet(row: list[str]) -> None:', 1)[1].split('async def get_rank_sales_channel', 1)[0]:
              if old not in text:
                  raise SystemExit('Could not find append row block.')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit rank seller totals sync
        run: |
          if git diff --quiet; then
            echo "No rank seller totals sync changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot.py
          git commit -m "Sync rank seller totals after sale"
          git push
