startCommand = '''python -c "from pathlib import Path;p=Path('bot.py');s=p.read_text(encoding='utf-8');old='\n@app_commands.checks.has_permissions(administrator=True)\nasync def setup_rank_sales_sheet(interaction: discord.Interaction) -> None:\n    await interaction.response.defer(ephemeral=True, thinking=True)';new='\nasync def setup_rank_sales_sheet(interaction: discord.Interaction) -> None:\n    if not any(getattr(r, \"name\", \"\") == \"Chat Moderator\" for r in getattr(interaction.user, \"roles\", [])):\n        await interaction.response.send_message(\"Only Chat Moderator can use this command.\", ephemeral=True)\n        return\n    await interaction.response.defer(ephemeral=True, thinking=True)';s=s.replace(old,new);seller_block='    seller_habbo = discord.ui.TextInput(\n        label=\"Seller Habbo Username\",\n        placeholder=\"Example: Dazamarin\",\n        required=True,\n        max_length=80,\n    )\n';s=s.replace(seller_block,'');s=s.replace('            seller_habbo = str(self.seller_habbo.value).strip()','            seller_habbo = interaction.user.display_name');s=s.replace('Discord Seller','Discord Username').replace('Seller Habbo','Habbo Username');s=s.replace('    \"Timestamp\",\n    \"Discord Username\",\n    \"Habbo Username\",\n    \"Buyer\",\n    \"Rank Sold\",\n    \"Amount\",\n    \"Proof / Notes\",','    \"Discord Username\",\n    \"Habbo Username\",\n    \"Buyer\",\n    \"Rank Sold\",\n    \"Amount\",\n    \"Proof / Notes\",\n    \"Timestamp\",');s=s.replace('                timestamp,\n                str(interaction.user),\n                seller_habbo,\n                buyer,\n                rank,\n                amount,\n                proof,','                str(interaction.user),\n                seller_habbo,\n                buyer,\n                rank,\n                amount,\n                proof,\n                timestamp,');s=s.replace('            cleaned.append([\n                padded[0],  # Timestamp\n                padded[1],  # Discord Username\n                padded[3],  # Habbo Username\n                padded[4],  # Buyer\n                padded[5],  # Rank Sold\n                padded[6],  # Amount\n                padded[7],  # Proof / Notes\n            ])\n        else:\n            cleaned.append(padded[:len(RANK_SALES_HEADERS)])','            cleaned.append([padded[1], padded[3], padded[4], padded[5], padded[6], padded[7], padded[0]])\n        else:\n            if old_header and old_header[0] == \"timestamp\":\n                cleaned.append([padded[1], padded[2], padded[3], padded[4], padded[5], padded[6], padded[0]])\n            else:\n                cleaned.append(padded[:len(RANK_SALES_HEADERS)])');s=s.replace('            worksheet.columns_auto_resize(0, 7)','            worksheet.spreadsheet.batch_update({\"requests\":[{\"updateDimensionProperties\":{\"range\":{\"sheetId\":worksheet.id,\"dimension\":\"COLUMNS\",\"startIndex\":i,\"endIndex\":i+1},\"properties\":{\"pixelSize\":w},\"fields\":\"pixelSize\"}} for i,w in enumerate([190,180,150,170,110,350,180])]})');s=s.replace('    worksheet.append_row(row, value_input_option=\"USER_ENTERED\")\n    apply_rank_sales_sheet_style(worksheet)','    worksheet.append_row(row, value_input_option=\"USER_ENTERED\")');s=s.replace('Timestamp, Discord Username, Habbo Username, Buyer, Rank Sold, Amount, Proof / Notes','Discord Username, Habbo Username, Buyer, Rank Sold, Amount, Proof / Notes, Timestamp');p.write_text(s, encoding='utf-8')" && python bot.py'''
